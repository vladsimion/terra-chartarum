# CI guardrail (KAN-14 / ATLAS-102).
# Runs on every PR and on pushes to main: format check -> type check -> build.
# Node is pinned via .node-version to match the Cloudflare Pages build (KAN-56).
name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Format, type-check & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier format check
        run: npm run format:check

      - name: Astro type check
        run: npm run check

      - name: Build (static output)
        run: npm run build
